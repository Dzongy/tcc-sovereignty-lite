<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZENITH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:monospace;height:100vh;display:flex;flex-direction:column}
#top{padding:10px;text-align:center;border-bottom:1px solid #00f0ff33}
#top h1{color:#00f0ff;font-size:18px;letter-spacing:4px}
#top span{color:#555;font-size:11px}
#chat{flex:1;overflow-y:auto;padding:10px}
.msg{margin:6px 0;padding:8px 12px;border-radius:8px;max-width:85%;font-size:14px;line-height:1.4}
.cmd{background:#1a1a2e;border-left:3px solid #00f0ff;margin-right:auto}
.zen{background:#0f2a1a;border-left:3px solid #0f0;margin-left:auto}
.ts{font-size:9px;color:#555;margin-top:3px}
#bar{padding:8px;border-top:1px solid #00f0ff33;display:flex;gap:6px}
#inp{flex:1;background:#12121a;border:1px solid #00f0ff44;color:#e0e0e0;padding:10px;border-radius:6px;font-family:monospace;font-size:14px}
#btn{background:#00f0ff;color:#000;border:none;padding:10px 16px;border-radius:6px;font-weight:bold;cursor:pointer}
#btn:active{background:#00c0cc}
#status{padding:4px;text-align:center;font-size:10px;color:#0f0}
</style></head>
<body>
<div id="top"><h1>ZENITH</h1><span>Sovereign AI | Supabase Live</span></div>
<div id="status">Connecting...</div>
<div id="chat"></div>
<div id="bar">
<input id="inp" placeholder="Command Zenith..." autocomplete="off">
<button id="btn" onclick="send()">SEND</button>
</div>
<script>
const U="https://vbqbbziqleymxcyesmky.supabase.co";
const K="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZicWJiemlxbGV5bXhjeWVzbWt5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MTExMTUxNiwiZXhwIjoyMDg2Njg3NTE2fQ.MREdeLv0R__fHe61lOYSconedoo_qHItZUpmcR-IORQ";
const H={"apikey":K,"Authorization":"Bearer "+K,"Content-Type":"application/json"};
let last=0;
const chat=document.getElementById("chat");
const inp=document.getElementById("inp");
const st=document.getElementById("status");
function add(who,txt,ts){
 let d=document.createElement("div");
 d.className="msg "+(who=="Zenith"?"zen":"cmd");
 d.innerHTML="<b>"+who+"</b> "+txt+"<div class=ts>"+new Date(ts).toLocaleTimeString()+"</div>";
 chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
async function send(){
 let t=inp.value.trim();if(!t)return;
 inp.value="";
 await fetch(U+"/rest/v1/zenith_messages",{method:"POST",headers:H,body:JSON.stringify({sender:"Commander",content:t})});
}
inp.addEventListener("keydown",function(e){if(e.key=="Enter")send()});
async function poll(){
 try{
  let r=await fetch(U+"/rest/v1/zenith_messages?id=gt."+last+"&order=id.asc",{headers:H});
  let d=await r.json();
  d.forEach(function(m){
   add(m.sender,m.content,m.timestamp);
   last=m.id;
  });
  st.textContent="LIVE | "+d.length+" msgs";
  st.style.color="#0f0";
 }catch(e){st.textContent="ERR: "+e;st.style.color="red"}
}
poll();setInterval(poll,3000);
</script></body></html>
